<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f5f5f5;
  color: #333;
  height: 100vh;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 16px;
}

#board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
  width: min(576px, calc(100vw - 32px));
  aspect-ratio: 1;
  border-radius: 4px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  user-select: none;
}

.square {
  position: relative;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.square.light { background: #f0d9b5; }
.square.dark { background: #b58863; }
.square.selected { background: #7fc97f !important; }
.square.last-move-from { background: #cdd26a !important; }
.square.last-move-to { background: #aaa23a !important; }
.square.check { background: radial-gradient(ellipse at center, #ff0000 0%, #e77 40%, transparent 70%) !important; }

.square.legal-move::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 25%; height: 25%;
  background: rgba(0,0,0,0.18);
  border-radius: 50%;
  z-index: 2;
}
.square.legal-capture::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 86%; height: 86%;
  border: 4px solid rgba(0,0,0,0.18);
  border-radius: 50%;
  z-index: 2;
}

.piece-img {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 83%; height: 83%;
  pointer-events: none;
  z-index: 1;
}

.coord {
  position: absolute;
  font-size: 10px;
  font-weight: 700;
  pointer-events: none;
  z-index: 3;
}
.rank-label { top: 2px; left: 3px; }
.file-label { bottom: 1px; right: 3px; }
.square.light .coord { color: #b58863; }
.square.dark .coord { color: #f0d9b5; }

/* Controls */
#status {
  font-size: 14px;
  font-weight: 600;
  color: #555;
  height: 20px;
}

#toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}

#toolbar button {
  padding: 6px 14px;
  background: #fff;
  color: #333;
  border: 1px solid #d0d0d0;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
}
#toolbar button:hover { background: #f0f0f0; }
#toolbar button:active { background: #e5e5e5; }

#thinking-text {
  font-size: 13px;
  color: #999;
  height: 18px;
}

/* Promotion modal */
#promotion-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  justify-content: center;
  align-items: center;
}
#promotion-modal.active { display: flex; }
#promotion-choices {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  display: flex;
  gap: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
.promo-piece {
  width: 64px; height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f5f5f5;
  border: 2px solid #ddd;
  border-radius: 8px;
  cursor: pointer;
}
.promo-piece:hover { background: #e8e8e8; transform: scale(1.08); }
.promo-piece img { width: 48px; height: 48px; }

/* New game popup */
#newgame-popup {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3);
  z-index: 90;
  justify-content: center;
  align-items: center;
}
#newgame-popup.active { display: flex; }
#newgame-content {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  min-width: 240px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
#newgame-content h3 { font-size: 15px; font-weight: 600; color: #333; text-align: center; }
.ng-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.ng-row label { font-size: 13px; color: #555; }
.ng-row select {
  padding: 6px 10px;
  background: #fff;
  color: #333;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 13px;
  flex: 1;
}
#newgame-content button.ng-start {
  padding: 10px;
  background: #4a7c59;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  margin-top: 4px;
}
#newgame-content button.ng-start:hover { background: #3d6b4a; }

/* Settings popup */
#settings-popup {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3);
  z-index: 90;
  justify-content: center;
  align-items: center;
}
#settings-popup.active { display: flex; }
#settings-content {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  min-width: 220px;
}
#settings-content h3 { font-size: 13px; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.set-option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 8px 12px;
  margin: 4px 0;
  background: #f5f5f5;
  border: 2px solid transparent;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  color: #333;
}
.set-option:hover { background: #eee; }
.set-option.selected { border-color: #7fc97f; background: #eafaea; }
.set-preview { display: flex; gap: 2px; margin-left: 12px; }
.set-preview img { width: 26px; height: 26px; }
</style>
</head>
<body>

<div id="app">
  <div id="status">White to move</div>
  <div id="board"></div>
  <div id="thinking-text"></div>
  <div id="toolbar">
    <button onclick="showNewGame()">New</button>
    <button onclick="undoMove()">Undo</button>
    <button onclick="toggleSettings()" title="Settings" style="padding:6px 10px;font-size:16px;line-height:1">&#9881;</button>
  </div>
</div>

<div id="newgame-popup">
  <div id="newgame-content">
    <h3>New Game</h3>
    <div class="ng-row">
      <label>Play as</label>
      <select id="player-color">
        <option value="w" selected>White</option>
        <option value="b">Black</option>
      </select>
    </div>
    <div class="ng-row">
      <label>Difficulty</label>
      <select id="difficulty">
        <option value="1">Beginner</option>
        <option value="2">Easy</option>
        <option value="3" selected>Medium</option>
        <option value="4">Hard</option>
        <option value="5">Expert</option>
      </select>
    </div>
    <button class="ng-start" onclick="startNewGame()">Start</button>
  </div>
</div>

<div id="settings-popup">
  <div id="settings-content">
    <h3>Pieces</h3>
    <div id="set-options"></div>
  </div>
</div>

<div id="promotion-modal">
  <div id="promotion-choices"></div>
</div>

<script src="chess.js"></script>
<script>
const PIECE_SETS = ['cburnett', 'chessnut', 'fantasy', 'merida', 'staunty'];
let pieceSet = 'cburnett';

function pieceSrc(c, t) { return 'pieces/' + pieceSet + '/' + c + t.toUpperCase() + '.svg'; }

let game = new Chess();
let selected = null;
let legalMoves = [];
let flipped = false;
let playerColor = 'w';
let lastMove = null;
let engineDepth = 3;
let thinking = false;

function renderBoard() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  for (let dr = 0; dr < 8; dr++) {
    for (let dc = 0; dc < 8; dc++) {
      const r = flipped ? 7 - dr : dr;
      const c = flipped ? 7 - dc : dc;
      const f = 'abcdefgh'[c], rk = 8 - r, sq = f + rk;
      const div = document.createElement('div');
      div.className = 'square ' + ((r + c) % 2 === 0 ? 'light' : 'dark');

      if (dc === 0) { const s = document.createElement('span'); s.className = 'coord rank-label'; s.textContent = rk; div.appendChild(s); }
      if (dr === 7) { const s = document.createElement('span'); s.className = 'coord file-label'; s.textContent = f; div.appendChild(s); }

      if (lastMove) {
        if (sq === lastMove.from) div.classList.add('last-move-from');
        if (sq === lastMove.to) div.classList.add('last-move-to');
      }
      if (selected === sq) div.classList.add('selected');
      if (legalMoves.some(m => m.to === sq)) div.classList.add(game.get(sq) ? 'legal-capture' : 'legal-move');
      if (game.in_check()) { const p = game.get(sq); if (p && p.type === 'k' && p.color === game.turn()) div.classList.add('check'); }

      const piece = game.get(sq);
      if (piece) {
        const img = document.createElement('img');
        img.className = 'piece-img';
        img.src = pieceSrc(piece.color, piece.type);
        img.draggable = false;
        div.appendChild(img);
      }

      div.addEventListener('click', () => onClick(sq));
      el.appendChild(div);
    }
  }
}

function updateStatus() {
  const el = document.getElementById('status');
  if (game.game_over()) {
    if (game.in_checkmate()) el.textContent = (game.turn() === 'w' ? 'Black' : 'White') + ' wins!';
    else el.textContent = 'Draw';
  } else {
    el.textContent = (game.turn() === 'w' ? 'White' : 'Black') + ' to move' + (game.in_check() ? ' (check)' : '');
  }
}

function save() {
  localStorage.setItem('chess', JSON.stringify({ pgn: game.pgn(), playerColor, engineDepth, pieceSet }));
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('chess'));
    if (d && d.pgn) {
      game.load_pgn(d.pgn);
      playerColor = d.playerColor || 'w';
      engineDepth = d.engineDepth || 3;
      pieceSet = d.pieceSet || 'cburnett';
      flipped = playerColor === 'b';
      const h = game.history({ verbose: true });
      lastMove = h.length ? { from: h[h.length-1].from, to: h[h.length-1].to } : null;
      if (!game.game_over() && game.turn() !== playerColor) engineMove();
    }
  } catch(e) {}
}

function update() { renderBoard(); updateStatus(); save(); }

function onClick(sq) {
  if (thinking || game.game_over() || game.turn() !== playerColor) return;
  const piece = game.get(sq);

  if (selected) {
    const move = legalMoves.find(m => m.to === sq);
    if (move) {
      if (move.piece === 'p' && (sq[1] === '8' || sq[1] === '1')) { showPromo(selected, sq); return; }
      doMove(selected, sq);
      return;
    }
    if (piece && piece.color === game.turn()) { select(sq); return; }
    selected = null; legalMoves = []; renderBoard(); return;
  }
  if (piece && piece.color === game.turn()) select(sq);
}

function select(sq) { selected = sq; legalMoves = game.moves({ square: sq, verbose: true }); renderBoard(); }

function doMove(from, to, promo) {
  const m = game.move({ from, to, promotion: promo || undefined });
  if (m) { lastMove = { from, to }; selected = null; legalMoves = []; update(); if (!game.game_over()) engineMove(); }
}

function showPromo(from, to) {
  const modal = document.getElementById('promotion-modal');
  const choices = document.getElementById('promotion-choices');
  choices.innerHTML = '';
  for (const p of ['q','r','b','n']) {
    const btn = document.createElement('button');
    btn.className = 'promo-piece';
    const img = document.createElement('img');
    img.src = pieceSrc(game.turn(), p);
    btn.appendChild(img);
    btn.onclick = () => { modal.classList.remove('active'); doMove(from, to, p); };
    choices.appendChild(btn);
  }
  modal.classList.add('active');
}

// Engine
const PV = { p: 100, n: 320, b: 330, r: 500, q: 900, k: 20000 };
const PST = {
  p:[0,0,0,0,0,0,0,0,50,50,50,50,50,50,50,50,10,10,20,30,30,20,10,10,5,5,10,25,25,10,5,5,0,0,0,20,20,0,0,0,5,-5,-10,0,0,-10,-5,5,5,10,10,-20,-20,10,10,5,0,0,0,0,0,0,0,0],
  n:[-50,-40,-30,-30,-30,-30,-40,-50,-40,-20,0,0,0,0,-20,-40,-30,0,10,15,15,10,0,-30,-30,5,15,20,20,15,5,-30,-30,0,15,20,20,15,0,-30,-30,5,10,15,15,10,5,-30,-40,-20,0,5,5,0,-20,-40,-50,-40,-30,-30,-30,-30,-40,-50],
  b:[-20,-10,-10,-10,-10,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,10,10,10,10,0,-10,-10,5,5,10,10,5,5,-10,-10,0,10,10,10,10,0,-10,-10,10,10,10,10,10,10,-10,-10,5,0,0,0,0,5,-10,-20,-10,-10,-10,-10,-10,-10,-20],
  r:[0,0,0,0,0,0,0,0,5,10,10,10,10,10,10,5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,0,0,0,5,5,0,0,0],
  q:[-20,-10,-10,-5,-5,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,5,5,5,5,0,-10,-5,0,5,5,5,5,0,-5,0,0,5,5,5,5,0,-5,-10,5,5,5,5,5,0,-10,-10,0,5,0,0,0,0,-10,-20,-10,-10,-5,-5,-10,-10,-20],
  k:[-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-20,-30,-30,-40,-40,-30,-30,-20,-10,-20,-20,-20,-20,-20,-20,-10,20,20,0,0,0,0,20,20,20,30,10,0,0,10,30,20]
};
const KE=[-50,-40,-30,-20,-20,-30,-40,-50,-30,-20,-10,0,0,-10,-20,-30,-30,-10,20,30,30,20,-10,-30,-30,-10,30,40,40,30,-10,-30,-30,-10,30,40,40,30,-10,-30,-30,-10,20,30,30,20,-10,-30,-30,-30,0,0,0,0,-30,-30,-50,-30,-30,-30,-30,-30,-30,-50];

function pst(p, sq, endg) {
  const c = sq.charCodeAt(0) - 97, r = 8 - +sq[1];
  const t = (p.type === 'k' && endg) ? KE : PST[p.type];
  return t[p.color === 'w' ? r * 8 + c : (7 - r) * 8 + c];
}

function evaluate(g) {
  const b = g.board(); let s = 0, wm = 0, bm = 0;
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) { const p = b[r][c]; if (!p || p.type === 'k') continue; if (p.color === 'w') wm += PV[p.type]; else bm += PV[p.type]; }
  const endg = (wm + bm) < 2600;
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) { const p = b[r][c]; if (!p) continue; const sq = 'abcdefgh'[c] + (8 - r); s += (p.color === 'w' ? 1 : -1) * (PV[p.type] + pst(p, sq, endg)); }
  s += (g.turn() === 'w' ? 1 : -1) * g.moves().length * 2;
  return s;
}

function order(g, moves) {
  return moves.map(m => { let s = 0; const mv = g.move(m); if (mv.captured) s += PV[mv.captured] * 10 - PV[mv.piece]; if (mv.flags.includes('p')) s += PV[mv.promotion || 'q']; if (g.in_check()) s += 50; g.undo(); return { m, s }; }).sort((a, b) => b.s - a.s).map(x => x.m);
}

function minimax(g, d, a, b, max) {
  if (d === 0) return evaluate(g);
  if (g.game_over()) return g.in_checkmate() ? (max ? -99999 + (engineDepth - d) : 99999 - (engineDepth - d)) : 0;
  const moves = order(g, g.moves());
  if (max) { let v = -Infinity; for (const m of moves) { g.move(m); v = Math.max(v, minimax(g, d-1, a, b, false)); g.undo(); a = Math.max(a, v); if (b <= a) break; } return v; }
  else { let v = Infinity; for (const m of moves) { g.move(m); v = Math.min(v, minimax(g, d-1, a, b, true)); g.undo(); b = Math.min(b, v); if (b <= a) break; } return v; }
}

function bestMove(g) {
  const max = g.turn() === 'w', moves = order(g, g.moves());
  let best = moves[0], bestE = max ? -Infinity : Infinity, evals = [];
  for (const m of moves) {
    g.move(m); const e = minimax(g, engineDepth - 1, -Infinity, Infinity, !max); g.undo();
    evals.push({ m, e });
    if (max ? e > bestE : e < bestE) { bestE = e; best = m; }
  }
  const cands = evals.filter(x => Math.abs(x.e - bestE) <= (engineDepth <= 2 ? 30 : 10));
  return cands.length > 1 ? cands[Math.floor(Math.random() * cands.length)].m : best;
}

function engineMove() {
  thinking = true;
  document.getElementById('thinking-text').textContent = 'Thinking...';
  setTimeout(() => {
    const m = game.move(bestMove(game));
    if (m) lastMove = { from: m.from, to: m.to };
    thinking = false;
    document.getElementById('thinking-text').textContent = '';
    update();
  }, 50);
}

function showNewGame() {
  document.getElementById('player-color').value = playerColor;
  document.getElementById('difficulty').value = engineDepth;
  document.getElementById('newgame-popup').classList.add('active');
}

function startNewGame() {
  document.getElementById('newgame-popup').classList.remove('active');
  game = new Chess();
  selected = null; legalMoves = []; lastMove = null; thinking = false;
  document.getElementById('thinking-text').textContent = '';
  playerColor = document.getElementById('player-color').value;
  engineDepth = +document.getElementById('difficulty').value;
  flipped = playerColor === 'b';
  localStorage.removeItem('chess');
  update();
  if (playerColor === 'b') engineMove();
}

function undoMove() {
  if (thinking) return;
  game.undo(); game.undo();
  const h = game.history({ verbose: true });
  lastMove = h.length ? { from: h[h.length-1].from, to: h[h.length-1].to } : null;
  selected = null; legalMoves = [];
  update();
}

function toggleSettings() {
  document.getElementById('settings-popup').classList.toggle('active');
}

function setPieceSet(name) {
  pieceSet = name;
  document.querySelectorAll('.set-option').forEach(el => el.classList.toggle('selected', el.dataset.set === name));
  renderBoard();
  save();
}

function initSettings() {
  const container = document.getElementById('set-options');
  for (const name of PIECE_SETS) {
    const opt = document.createElement('button');
    opt.className = 'set-option' + (name === pieceSet ? ' selected' : '');
    opt.dataset.set = name;
    opt.onclick = () => { setPieceSet(name); toggleSettings(); };
    const label = document.createElement('span');
    label.textContent = name.charAt(0).toUpperCase() + name.slice(1);
    opt.appendChild(label);
    const preview = document.createElement('span');
    preview.className = 'set-preview';
    for (const [c, t] of [['w','N'],['b','Q'],['w','P'],['b','R']]) {
      const img = document.createElement('img');
      img.src = 'pieces/' + name + '/' + c + t + '.svg';
      preview.appendChild(img);
    }
    opt.appendChild(preview);
    container.appendChild(opt);
  }
  document.getElementById('settings-popup').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });
  document.getElementById('newgame-popup').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });
}

load();
initSettings();
update();
</script>
</body>
</html>
